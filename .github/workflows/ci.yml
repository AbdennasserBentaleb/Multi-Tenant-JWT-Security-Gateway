name: CI — Build, Test, Push

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/jwt-security-gateway
  JAVA_VERSION: "21"

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 1: Unit + Integration Tests
  # ──────────────────────────────────────────────────────────────────────────
  test:
    name: Test (Java ${{ env.JAVA_VERSION }})
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run unit and integration tests
        run: >
          mvn verify
          --no-transfer-progress
          -Dspring.profiles.active=test
        # Testcontainers needs Docker socket access — ubuntu-latest has Docker
        # pre-installed. No special configuration needed.

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2: Build and push Docker image to GHCR
  # Only runs on main branch push (not PRs)
  # ──────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push (Distroless)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build application jar (skip tests — already ran)
        run: mvn package -DskipTests --no-transfer-progress

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Build platform matches k3s Alpine Linux nodes (amd64)
          platforms: linux/amd64
