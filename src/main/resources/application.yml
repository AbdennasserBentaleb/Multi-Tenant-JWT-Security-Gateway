spring:
  application:
    name: jwt-security-gateway

  # ─────────────────────────────────────────────────────────
  #  12-Factor III: Store config in the environment
  #  All secrets are injected via env vars — never hardcoded
  # ─────────────────────────────────────────────────────────
  security:
    oauth2:
      resourceserver:
        jwt:
          # Keycloak / any OIDC provider — set OAUTH2_ISSUER_URI in your env
          issuer-uri: ${OAUTH2_ISSUER_URI:http://localhost:8180/realms/gateway}

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/gatewaydb}
    username: ${DB_USER:gateway_user}
    password: ${DB_PASSWORD:changeme}
    hikari:
      # Keep pool small for Distroless/k3s — tune per workload
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      # Validate connection before use
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway owns the schema
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        default_schema: public
    open-in-view: false           # 12-Factor-safe: no lazy loading leaks

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

# ─────────────────────────────────────────────────────────
#  Actuator — k3s liveness and readiness probes
# ─────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

# ─────────────────────────────────────────────────────────
#  Server
# ─────────────────────────────────────────────────────────
server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful             # k3s-safe graceful pod termination
  compression:
    enabled: true

# ─────────────────────────────────────────────────────────
#  OpenAPI / Swagger UI
# ─────────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true

# ─────────────────────────────────────────────────────────
#  Logging
# ─────────────────────────────────────────────────────────
logging:
  level:
    dev.gateway: DEBUG
    org.springframework.security: INFO
    org.flywaydb: INFO
