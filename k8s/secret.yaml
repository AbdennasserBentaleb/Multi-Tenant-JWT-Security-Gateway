---
# Sensitive credentials — in production use Sealed Secrets or Vault Agent Injector
# This file is intentionally using placeholder values and is committed as a template.
# Never commit real secrets to source control.
apiVersion: v1
kind: Secret
metadata:
  name: gateway-secrets
  namespace: jwt-gateway
  labels:
    app.kubernetes.io/name: jwt-security-gateway
  annotations:
    # Reminder: Replace with Sealed Secrets or External Secrets Operator before prod
    kubernetes.io/description: "Database credentials for jwt-security-gateway"
type: Opaque
stringData:
  DB_USER: "gateway_user"
  DB_PASSWORD: "REPLACE_WITH_SEALED_SECRET"
